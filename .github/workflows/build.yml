# Reusable: builds swift-format from source for every published
# platform, verifies it runs, packages each binary, and uploads them
# as artifacts. Called by ci.yml (every PR) and release.yml (on
# dispatch, which adds the publish step on top).
name: Build binaries

on:
  workflow_call:
    inputs:
      version:
        description: "swift-format release tag to build (e.g. 603.0.0)"
        required: true
        type: string

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            slug: linux-x86_64
            container: swift:6.3-jammy
          - runner: ubuntu-24.04-arm
            slug: linux-aarch64
            container: swift:6.3-jammy
          - runner: macos-14
            slug: macos-arm64
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    steps:
      - name: Check out swift-format
        uses: actions/checkout@v4
        with:
          repository: swiftlang/swift-format
          ref: ${{ inputs.version }}

      # macOS runners default to an older Xcode (Swift 5.10).
      - name: Select newest stable Xcode
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            swift build -c release --product swift-format --static-swift-stdlib
          else
            swift build -c release --product swift-format
          fi
          bin="$(swift build -c release --show-bin-path)/swift-format"
          "$bin" --version
          # Record the runtime linkage so we can confirm self-containment.
          if [ "${{ runner.os }}" = "Linux" ]; then
            ldd "$bin"
          else
            otool -L "$bin"
          fi

      - name: Package
        run: |
          bin_dir="$(swift build -c release --show-bin-path)"
          out="swift-format-${{ inputs.version }}-${{ matrix.slug }}.tar.gz"
          tar -C "$bin_dir" -czf "$out" swift-format
          if [ "${{ runner.os }}" = "Linux" ]; then
            sha256sum "$out"
          else
            shasum -a 256 "$out"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swift-format-${{ matrix.slug }}
          path: swift-format-*.tar.gz
