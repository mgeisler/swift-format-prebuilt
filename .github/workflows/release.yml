# Builds the binaries (via the reusable build workflow) and attaches
# them to a draft GitHub release. After it runs: copy the printed
# sha256s into extensions.bzl, commit, then publish the release (see
# README).
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "swift-format release tag to build (e.g. 603.0.0)"
        required: true

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ inputs.version }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd dist
          sha256sum *.tar.gz | tee checksums.txt

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: swift-format ${{ inputs.version }}
          draft: true
          files: dist/*.tar.gz
          body_path: dist/checksums.txt
