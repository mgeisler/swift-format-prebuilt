# Bazel Central Registry presubmit. Builds and runs the packaged
# binary on each platform we publish a binary for.
bcr_test_module:
  module_path: "e2e/smoke"
  matrix:
    platform:
      - debian12
      - macos_arm64
    bazel: [7.x, 8.x, 9.x]
  tasks:
    run_test:
      name: "swift-format --version"
      platform: ${{ platform }}
      bazel: ${{ bazel }}
      test_targets:
        - "//..."
